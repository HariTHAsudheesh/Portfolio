<section class="contact-section py-5" id="contact">
  <div class="container">

    <!-- Title -->
    <div class="position-relative text-center mb-5">
      <h1 class="display-1 text-uppercase outline-text">Contact</h1>
      <h2 class="position-absolute top-50 start-50 translate-middle text-primary">
        Contact Me
      </h2>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8">

        <form class="contact-form p-4 text-center">

          <div class="row g-3">
            <div class="col-md-6">
              <input type="text" class="form-control" placeholder="Your Name" #namebox>
            </div>

            <div class="col-md-6">
              <input type="email" class="form-control" placeholder="Your Email" #emailbox>
            </div>
          </div>

          <div class="mt-3">
            <input type="text" class="form-control" placeholder="Subject" #subjectbox>
          </div>

          <div class="mt-3">
            <textarea class="form-control" rows="5" placeholder="Message" #messagebox></textarea>
          </div>

          <button class="btn btn-primary px-4" (click)="sendToWhatsApp()">
  Send Message
</button>

        </form>

      </div>
    </div>

  </div>
</section>
