
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
     <!-- Header Start -->
     <section class="hero-section d-flex align-items-center" id="home">
  <div class="container">
    <div class="row align-items-center">

      <!-- LEFT CONTENT -->
      <div class="col-lg-6 text-center text-lg-start">
        <h4 class="text-light mb-3">Hello, my name is</h4>

        <h1 class="display-4 fw-bold text-primary mb-2">
          {{name}}
        </h1>

        <h2 class="text-light mb-4">
          {{profileTitle}}
        </h2>

        <div class="d-flex gap-3 justify-content-center justify-content-lg-start">
          <a href="assets/Cv/Haritha C K.pdf" 
             download 
             class="btn btn-primary px-4 py-2">
             Download CV
          </a>

          <a href="#contact" class="btn btn-outline-light px-4 py-2">
             Contact Me
          </a>
        </div>
      </div>

      <!-- RIGHT IMAGE -->
      <div class="col-lg-6 text-center mt-4 mt-lg-0">
        <img 
          [src]="profileImg" 
          class="img-fluid rounded-circle hero-img"
          alt="profile">
      </div>

    </div>
  </div>
</section>
    <!-- Header End -->

</body>
</html>
